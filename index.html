<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>WAV_V3.1 Enhanced</title>
<style>
html,body{margin:0;padding:0;background:#05070c;overflow:hidden;font-family:monospace}
canvas{display:block;width:100vw;height:100vh;touch-action:none;background:#05070c}
button{user-select:none;-webkit-user-select:none}
.ui{position:fixed;z-index:5}
#pad{left:14px;bottom:14px;display:grid;grid-template-columns:64px 64px 64px;gap:8px}.padgap{visibility:hidden}
#pad button,#fire,#pause{background:#000c;color:#25f3ff;border:2px solid #25f3ff;border-radius:12px;box-shadow:0 0 10px #25f3ff80;font-size:22px}
#pad button{height:64px}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:#000b;color:#dff;text-align:center;z-index:10}
#fire{right:18px;bottom:24px;width:86px;height:86px;border-radius:50%;font-size:28px}#pause{top:16px;right:16px;padding:10px 14px}
</style></head><body>
<canvas id="c"></canvas>
<div id="start" class="overlay"><div><h1>WAV_V3.1</h1><p>Watcher AI Enhanced</p><button onclick="startGame()">▶ Start</button></div></div>
<div id="over" class="overlay" style="display:none"><div><h1>💀 SYSTEM FAILURE</h1><p id="scoreOut"></p><button onclick="startGame()">↻ Retry</button></div></div>
<div id="pauseOverlay" class="overlay" style="display:none"><h1>⏸ Paused</h1></div>
<div id="pad" class="ui"><div class="padgap"></div><button id="up">⬆</button><div class="padgap"></div><button id="left">⬅</button><button id="down">⬇</button><button id="right">➡</button></div>
<button id="fire" class="ui">⚡</button><button id="pause" class="ui">⏸</button>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d'); let W=0,H=0;
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;W=canvas.width;H=canvas.height;if(ship){ship.x=Math.min(ship.x,W-20);ship.y=Math.min(ship.y,H-20)}} addEventListener('resize',resize);
let running=false,paused=false,score=0,lives=3,level=1,lastBossScore=-1000,spawnTick=0;
const keys={};
const ship={x:160,y:400,w:22,h:28,vx:0,vy:0,maxV:6,acc:0.75,fr:0.88,cool:0,power:1};
const shots=[],enemies=[],fx=[],bossShots=[]; let boss=null;
function reset(){score=0;lives=3;level=1;lastBossScore=-1000;shots.length=enemies.length=fx.length=bossShots.length=0;boss=null;ship.x=W/2;ship.y=H*0.82;ship.vx=ship.vy=0;ship.power=1;}
function startGame(){document.getElementById('start').style.display='none';document.getElementById('over').style.display='none';paused=false;running=true;reset();resize();loop();}
function fire(){if(!running||paused||ship.cool>0)return;ship.cool=10;for(let i=0;i<ship.power;i++){let off=(i-(ship.power-1)/2)*12;shots.push({x:ship.x+off,y:ship.y-18,vy:-10});}}
function enemy(){let s=18+Math.random()*18;enemies.push({x:20+Math.random()*(W-40),y:-20,w:s,h:s,vy:2+Math.random()*2+level*0.25,hp:1});}
function makeBoss(){boss={x:W/2,y:90,w:140,h:54,vx:2.4,hp:35+level*10,max:35+level*10};lastBossScore=score;}
function hit(x,y,n=10){for(let i=0;i<n;i++)fx.push({x,y,r:2+Math.random()*3,a:1,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3});}
function update(){if(paused)return; ship.cool=Math.max(0,ship.cool-1);
if(keys.left)ship.vx-=ship.acc;if(keys.right)ship.vx+=ship.acc;if(keys.up)ship.vy-=ship.acc;if(keys.down)ship.vy+=ship.acc;
ship.vx=Math.max(-ship.maxV,Math.min(ship.maxV,ship.vx)); ship.vy=Math.max(-ship.maxV,Math.min(ship.maxV,ship.vy));
ship.vx*=ship.fr; ship.vy*=ship.fr; ship.x=Math.max(12,Math.min(W-12,ship.x+ship.vx)); ship.y=Math.max(16,Math.min(H-16,ship.y+ship.vy));
for(let i=shots.length-1;i>=0;i--){shots[i].y+=shots[i].vy;if(shots[i].y<-30)shots.splice(i,1)}
spawnTick++; if(spawnTick>18-Math.min(10,level)){spawnTick=0;enemy();}
for(let i=enemies.length-1;i>=0;i--){let e=enemies[i];e.y+=e.vy;if(e.y>H+30)enemies.splice(i,1); if(Math.abs(e.x-ship.x)<(e.w/2+ship.w/2)&&Math.abs(e.y-ship.y)<(e.h/2+ship.h/2)){enemies.splice(i,1);lives--;hit(ship.x,ship.y,18);}}
for(let i=enemies.length-1;i>=0;i--)for(let j=shots.length-1;j>=0;j--){let e=enemies[i],s=shots[j]; if(Math.abs(e.x-s.x)<e.w/2&&Math.abs(e.y-s.y)<e.h/2){enemies.splice(i,1);shots.splice(j,1);score+=20;hit(e.x,e.y,12); if(Math.random()<0.08&&ship.power<3)ship.power++; break;}}
if(score>0 && score-lastBossScore>=1000 && !boss)makeBoss();
if(boss){boss.x+=boss.vx;if(boss.x<boss.w/2||boss.x>W-boss.w/2)boss.vx*=-1; if(Math.random()<0.03+level*0.002)bossShots.push({x:boss.x,y:boss.y+20,vy:4+level*0.15});
for(let i=bossShots.length-1;i>=0;i--){let b=bossShots[i];b.y+=b.vy;if(b.y>H+20)bossShots.splice(i,1); else if(Math.abs(b.x-ship.x)<14&&Math.abs(b.y-ship.y)<14){bossShots.splice(i,1);lives--;hit(ship.x,ship.y,18);}}
for(let j=shots.length-1;j>=0;j--){let s=shots[j]; if(Math.abs(s.x-boss.x)<boss.w/2&&Math.abs(s.y-boss.y)<boss.h/2){shots.splice(j,1);boss.hp--;hit(s.x,s.y,4); if(boss.hp<=0){score+=500;level++;hit(boss.x,boss.y,40);boss=null;break;}}}}
for(let i=fx.length-1;i>=0;i--){let p=fx[i];p.x+=p.vx;p.y+=p.vy;p.a-=0.03;if(p.a<=0)fx.splice(i,1)}
score+=0.08;if(lives<=0)gameOver();}
function draw(){ctx.clearRect(0,0,W,H);ctx.strokeStyle='#123';for(let y=0;y<H;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
ctx.shadowBlur=18;ctx.shadowColor='#25f3ff';ctx.fillStyle='#25f3ff';ctx.fillRect(ship.x-6,ship.y-14,12,28);
ctx.shadowColor='#fff';ctx.fillStyle='#fff';shots.forEach(s=>ctx.fillRect(s.x-2,s.y-8,4,12));
ctx.shadowColor='#f60';ctx.fillStyle='#f60';enemies.forEach(e=>{ctx.beginPath();ctx.arc(e.x,e.y,e.w/2,0,7);ctx.fill();});
if(boss){ctx.shadowColor='#f0a';ctx.fillStyle='#f06';ctx.fillRect(boss.x-boss.w/2,boss.y-boss.h/2,boss.w,boss.h);ctx.fillStyle='#222';ctx.fillRect(W/2-100,18,200,10);ctx.fillStyle='#f06';ctx.fillRect(W/2-100,18,200*(boss.hp/boss.max),10)}
ctx.shadowColor='#ff0';ctx.fillStyle='#ff0';bossShots.forEach(b=>ctx.fillRect(b.x-3,b.y-6,6,10));
fx.forEach(p=>{ctx.globalAlpha=p.a;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();ctx.globalAlpha=1});
ctx.shadowBlur=0;ctx.fillStyle='#dff';ctx.font='16px monospace';ctx.fillText('Score '+Math.floor(score),10,22);ctx.fillText('Lives '+lives,10,42);ctx.fillText('Lvl '+level,10,62);ctx.fillText('Power '+ship.power,10,82)}
function loop(){if(!running)return;if(!paused){update();draw();}requestAnimationFrame(loop)}
function gameOver(){running=false;document.getElementById('scoreOut').textContent='Final Score: '+Math.floor(score);document.getElementById('over').style.display='grid'}
function bind(id,key){let e=document.getElementById(id);['touchstart','mousedown'].forEach(t=>e.addEventListener(t,a=>{a.preventDefault();keys[key]=true;},{passive:false}));['touchend','mouseup','mouseleave'].forEach(t=>e.addEventListener(t,a=>{a.preventDefault();keys[key]=false;},{passive:false}))}
bind('left','left');bind('right','right');bind('up','up');bind('down','down'); document.getElementById('fire').addEventListener('touchstart',e=>{e.preventDefault();fire();},{passive:false}); document.getElementById('fire').onclick=fire;
document.getElementById('pause').onclick=()=>{paused=!paused;document.getElementById('pauseOverlay').style.display=paused?'grid':'none'};
onkeydown=e=>{let k=e.key.replace('Arrow','').toLowerCase(); if(['left','right','up','down'].includes(k))keys[k]=true; if(e.key===' '||e.key==='Enter')fire(); if(k==='p')document.getElementById('pause').click();}; onkeyup=e=>{let k=e.key.replace('Arrow','').toLowerCase(); keys[k]=false;};
resize();
</script></body></html>
