<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WAV_V3.0 — Watcher AI Vertical</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
html,body{margin:0;padding:0;background:#05070c;overflow:hidden;font-family:monospace;}
canvas{display:block;width:100vw;height:100vh;background:#05070c;touch-action:none;}

/* ===== Overlay FX ===== */
.overlay{position:fixed;inset:0;background:#000a;display:grid;place-items:center;color:#bffcff;text-align:center;}
.overlay h1{margin:0 0 16px;color:#ff59d1;text-shadow:0 0 20px #ff59d1,0 0 10px #25f3ff;animation:titleGlow 2s infinite alternate;}
@keyframes titleGlow{0%{text-shadow:0 0 10px #25f3ff;}100%{text-shadow:0 0 25px #ff59d1;}}
.overlay button{margin-top:20px;border:3px solid #25f3ff;color:#25f3ff;background:#000;padding:14px 32px;font-size:22px;border-radius:12px;
box-shadow:0 0 12px #25f3ff80;font-family:inherit;cursor:pointer;}
.overlay img{max-width:60%;margin:20px auto;display:block;border-radius:12px;box-shadow:0 0 20px #25f3ff;animation:glowPulse 2.4s ease-in-out infinite;}
@keyframes glowPulse{0%,100%{box-shadow:0 0 12px #25f3ff;}50%{box-shadow:0 0 28px #ff59d1;}}

/* ===== Controls ===== */
#leftControls{position:fixed;bottom:20px;left:20px;display:grid;grid-template-columns:70px 70px 70px;grid-template-rows:70px 70px;gap:12px;}
#leftControls button{border:2px solid #25f3ff;color:#25f3ff;background:#000c;border-radius:8px;font-size:22px;box-shadow:0 0 10px #25f3ff80;cursor:pointer;}
#fireBtn{position:fixed;bottom:40px;right:40px;border:3px solid #25f3ff;color:#25f3ff;background:#000c;border-radius:50%;width:90px;height:90px;
font-size:28px;box-shadow:0 0 12px #25f3ff80;cursor:pointer;}
#pauseBtn{position:fixed;top:20px;right:20px;border:3px solid #25f3ff;color:#25f3ff;background:#000c;border-radius:8px;padding:10px 16px;font-size:18px;cursor:pointer;}

/* ===== Flicker for Game Over ===== */
@keyframes flicker{0%,18%,22%,25%,53%,57%,100%{opacity:1;}20%,24%,55%{opacity:0;}}
#gameover h1{animation:flicker 2s infinite;}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- Start Overlay -->
<div id="start" class="overlay">
  <div>
    <h1>WAV_V3.0</h1>
    <div>Watcher AI Vertical — Blade Digital</div>
    <img src="assets/ship_start.png" alt="Neon Ship">
    <button onclick="bootSequence()">▶ Boot AI</button>
  </div>
</div>

<!-- Game Over -->
<div id="gameover" class="overlay" style="display:none">
  <div>
    <h1>💀 SYSTEM FAILURE 💀</h1>
    <div id="finalScore">Final Score: 0</div>
    <button onclick="restartGame()">↻ Reboot</button>
    <button onclick="alert('Uploading logs to HQ... ✅')">☁ Upload Logs</button>
  </div>
</div>

<!-- Pause Overlay -->
<div id="pauseOverlay" class="overlay" style="display:none">
  <h1>⏸ SYSTEM HOLD</h1>
</div>

<!-- Mobile Controls -->
<div id="leftControls">
  <button id="up">⬆︎</button>
  <button id="left">⬅︎</button>
  <button id="down">⬇︎</button>
  <button id="right">➡︎</button>
</div>
<button id="fireBtn">⚡</button>
<button id="pauseBtn">⏸</button>

            startGame();
